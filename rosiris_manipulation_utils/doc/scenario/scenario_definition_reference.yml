# Scenario File Schema Reference
# This is a documentation file showing the structure and types, not a valid YAML instance

# Enumerations
scene_manager_operation:
  ADD: 0
  REMOVE: 1
  APPEND: 2
  MOVE: 3

solid_primitive_type:
  BOX: 1
  SPHERE: 2
  CYLINDER: 3
  CONE: 4
  PRISM: 5

cmu_mode:
  REPLACE: 0
  MERGE: 1
  REMOVE: 2

rotation_unit:
  DEG: 0
  RAD: 1

# Data Types
metadata:
  schema_version: string          # Required, format: "X.Y.Z" (semver)
  name: string                    # Optional, default: ""
  author: string                  # Optional, default: ""
  description: string             # Optional, default: ""
  created: string                 # Optional, default: "", format: ISO 8601

stamp:
  sec: int                        # Optional, default: 0
  nanosec: int                    # Optional, default: 0

header:
  frame_id: string                # Required
  stamp: stamp                    # Optional, default: {sec: 0, nanosec: 0}

position:
  x: float                        # Optional, default: 0.0
  y: float                        # Optional, default: 0.0
  z: float                        # Optional, default: 0.0

orientation_rpy:
  r: float                        # Roll, optional, default: 0.0
  p: float                        # Pitch, optional, default: 0.0
  y: float                        # Yaw, optional, default: 0.0
  unit: rotation_unit             # (DEG | RAD), default DEG 

pose:
  position: position              # Optional, default: {x: 0.0, y: 0.0, z: 0.0}
  orientation: orientation_rpy    # Optional, default: {r: 0.0, p: 0.0, y: 0.0}

primitive:
  type: solid_primitive_type      # Required (BOX | SPHERE | CYLINDER | CONE | PRISM)
  dimensions: [float]             # Required, length depends on type
  pose: pose                      # Optional, default: identity pose

mesh:
  path: string                    # Required, absolute or relative file path
  pose: pose                      # Optional, default: identity pose

subframe:
  name: string                    # Required
  pose: pose                      # Optional, default: identity pose
  is_grasp_point: bool            # Optional, default: false

collision_object:
  header: header                  # Required
  id: string                      # Required, unique identifier
  pose: pose                      # Optional, default: identity pose
  primitives: [primitive]         # Optional, default: []
  meshes: [mesh]                  # Optional, default: []
  subframes: [subframe]           # Optional, default: []
  operation: scene_manager_operation  # Optional, default: ADD
  self_collision_allowed: bool    # Optional, default: true
  allowed_touch_links: [string]   # Optional, default: []

collision_entry:
  touch_link: string              # Required
  collision_allowed: bool         # Required

collision_matrix_update:
  target_link: string             # Required
  mode: cmu_mode                  # Required (REPLACE | MERGE | REMOVE)
  collision_entries: [collision_entry]  # Required

scenario:
  metadata: metadata              # Required
  collision_objects: [collision_object]  # Optional, default: []
  collision_matrix_updates: [collision_matrix_update]  # Optional, default: []